# UNIT-01: i18n基盤の雛形。各ユニットの実装時にメッセージキーを追加する。

# UNIT-02: APIエラーメッセージ（BR-API-01）。キーは error.<code>
error.AUTH_INVALID_CREDENTIALS=メールアドレスまたはパスワードが正しくありません
error.AUTH_ACCOUNT_LOCKED=ログイン試行回数が上限に達したため、一時的にロックされています。しばらくしてから再度お試しください
error.AUTH_REFRESH_TOKEN_INVALID=セッションが無効です。再度ログインしてください
error.REGISTRATION_TOKEN_EXPIRED=登録用リンクの有効期限が切れています
error.REGISTRATION_TOKEN_INVALID=登録用リンクが無効です
error.PASSWORD_TOO_SHORT=パスワードは{0}文字以上で入力してください
error.PASSWORD_COMPROMISED=このパスワードは既知の漏えいパスワードリストに含まれているため使用できません
error.USER_STATE_TRANSITION_INVALID=対象ユーザの現在の状態ではこの操作を行えません
error.VALIDATION_ERROR=入力内容に誤りがあります
error.INTERNAL_SERVER_ERROR=予期しないエラーが発生しました。しばらくしてから再度お試しください
