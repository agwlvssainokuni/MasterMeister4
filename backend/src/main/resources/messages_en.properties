# UNIT-01: i18n foundation skeleton. Message keys are added as each unit is implemented.

# UNIT-02: API error messages (BR-API-01). Keys are error.<code>
error.AUTH_INVALID_CREDENTIALS=Invalid email or password
error.AUTH_ACCOUNT_LOCKED=Too many failed login attempts. This account is temporarily locked. Please try again later
error.AUTH_REFRESH_TOKEN_INVALID=Your session is invalid. Please log in again
error.REGISTRATION_TOKEN_EXPIRED=This registration link has expired
error.REGISTRATION_TOKEN_INVALID=This registration link is invalid
error.PASSWORD_TOO_SHORT=Password must be at least {0} characters long
error.PASSWORD_COMPROMISED=This password appears in a known data breach and cannot be used
error.USER_STATE_TRANSITION_INVALID=This operation cannot be performed on the user's current status
error.VALIDATION_ERROR=The submitted data is invalid
error.INTERNAL_SERVER_ERROR=An unexpected error occurred. Please try again later

# UNIT-03: RDBMS setup
error.RDBMS_CONNECTION_NOT_FOUND=The specified connection was not found
error.SCHEMA_IMPORT_FAILED=Schema import failed
error.SCHEMA_NOT_IMPORTED=Schema has not been imported yet

# UNIT-04: Access control
error.GROUP_NOT_FOUND=The specified group was not found
error.GROUP_NAME_DUPLICATE=A group with this name already exists
error.GROUP_MEMBERSHIP_DUPLICATE=This user is already a member of the group
error.USER_NOT_FOUND=The specified user was not found
error.PERMISSION_YAML_IMPORT_REJECTED=Import was rejected: {0}
