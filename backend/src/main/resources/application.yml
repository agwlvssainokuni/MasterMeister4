spring:
  application:
    name: mastermeister
  web:
    locale: ja
    locale-resolver: accept_header

  datasource:
    url: jdbc:h2:file:${MM_APP_DATASOURCE_PATH:./data/mastermeister}
    driver-class-name: org.h2.Driver
    username: ${MM_APP_DATASOURCE_USERNAME:sa}
    password: ${MM_APP_DATASOURCE_PASSWORD:}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MM_APP_MAIL_HOST:localhost}
    port: ${MM_APP_MAIL_PORT:1025}
    username: ${MM_APP_MAIL_USERNAME:}
    password: ${MM_APP_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MM_APP_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MM_APP_MAIL_SMTP_STARTTLS:false}

server:
  port: ${SERVER_PORT:8080}

mm:
  app:
    jwt:
      secret: ${MM_APP_JWT_SECRET:}
      access-token-expiry: ${MM_APP_JWT_ACCESS_TOKEN_EXPIRY:PT10M}
      refresh-token-expiry: ${MM_APP_JWT_REFRESH_TOKEN_EXPIRY:P1D}
    password:
      bcrypt-strength: ${MM_APP_PASSWORD_BCRYPT_STRENGTH:10}
      min-length: ${MM_APP_PASSWORD_MIN_LENGTH:8}
    login-attempt:
      max-failures: ${MM_APP_LOGIN_ATTEMPT_MAX_FAILURES:5}
      lock-duration: ${MM_APP_LOGIN_ATTEMPT_LOCK_DURATION:PT15M}
    user-registration:
      token-expiry: ${MM_APP_USER_REGISTRATION_TOKEN_EXPIRY:PT3H}
      rate-limit-max-requests: ${MM_APP_USER_REGISTRATION_RATE_LIMIT_MAX_REQUESTS:3}
      rate-limit-window: ${MM_APP_USER_REGISTRATION_RATE_LIMIT_WINDOW:PT1H}
    admin-bootstrap:
      email: ${MM_APP_ADMIN_BOOTSTRAP_EMAIL:}
      password: ${MM_APP_ADMIN_BOOTSTRAP_PASSWORD:}
    frontend:
      base-url: ${MM_APP_FRONTEND_BASE_URL:http://localhost:8080}
    datasource:
      path: ${MM_APP_DATASOURCE_PATH:./data/mastermeister}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
